<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -30 60 60" width="1024" height="1024">
  <defs>
    <clipPath id="b">
      <circle cx="0" cy="-15" r="9.5" />
      <circle cx="0" cy="-15" r="9.5" transform="rotate(120)" />
      <circle cx="0" cy="-15" r="9.5" transform="rotate(240)" />
    </clipPath>
    <mask id="a">
      <rect x="-27" y="-27" width="54" height="54" fill="white" />
      <circle cx="0" cy="0" r="3" fill="black" />
      <g>
        <rect x="-2" y="-27" width="4" height="4" fill="black" />
        <rect x="-0.5" y="-6" width="1" height="4" fill="black" />
        <circle cx="0" cy="-15" r="10.5" fill="black" />
      </g>
      <g transform="rotate(120)">
        <rect x="-2" y="-27" width="4" height="4" fill="black" />
        <rect x="-0.5" y="-6" width="1" height="4" fill="black" />
        <circle cx="0" cy="-15" r="10.5" fill="black" />
      </g>
      <g transform="rotate(240)">
        <rect x="-2" y="-27" width="4" height="4" fill="black" />
        <rect x="-0.5" y="-6" width="1" height="4" fill="black" />
        <circle cx="0" cy="-15" r="10.5" fill="black" />
      </g>
    </mask>
  </defs>
  <!-- <rect fill="#ffd800" x="-30" y="-30" width="60" height="60" /> -->
  <circle cx="0" cy="0" r="30" fill="#ffd800" />
  <g mask="url(#a)" fill="black">
    <circle cx="0" cy="-11" r="15" />
    <circle cx="0" cy="-11" r="15" transform="rotate(120)" />
    <circle cx="0" cy="-11" r="15" transform="rotate(240)" />
  </g>
  <circle cx="0" cy="0" r="11.75" fill="none" stroke="black" stroke-width="3.5"
    clip-path="url(#b)" />
</svg>
